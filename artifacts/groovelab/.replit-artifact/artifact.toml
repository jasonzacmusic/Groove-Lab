kind = "web"
previewPath = "/"
title = "GrooveLab"
version = "1.0.0"
id = "artifacts/groovelab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25772

[services.development]
run = "pnpm --filter @workspace/groovelab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/groovelab", "run", "build" ]
publicDir = "artifacts/groovelab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25772"
BASE_PATH = "/"
